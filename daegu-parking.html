<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대구 주차맵</title>
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=ac2c982d517d3319ad0a5e6f459a30db&libraries=services,clusterer"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
    --accent: #4f8ef7; --accent2: #f7a24f; --text: #e8eaf0;
    --text-muted: #7a7f9a; --border: rgba(255,255,255,0.07);
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { padding: 14px 20px; display: flex; align-items: center; gap: 12px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 10; flex-shrink: 0; flex-wrap: wrap; }
  .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; white-space: nowrap; }
  .logo span { color: var(--text); font-weight: 300; }
  .search-bar { display: flex; flex: 1; gap: 8px; max-width: 480px; }
  .search-bar input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--text-muted); }
  .btn { background: var(--accent); border: none; border-radius: 8px; padding: 9px 16px; color: #fff; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn-outline { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: var(--surface2); opacity: 1; }
  .main { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; height: 100%; }
  .sidebar { width: 330px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  .sidebar-header { padding: 14px 18px 10px; border-bottom: 1px solid var(--border); }
  .sidebar-header .count { font-size: 20px; font-weight: 700; color: var(--text); }
  .sidebar-header .sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .filter-section { padding: 10px 18px; border-bottom: 1px solid var(--border); }
  .filter-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .filter-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .filter-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 11px; color: var(--text-muted); font-family: 'Noto Sans KR', sans-serif; font-size: 11px; cursor: pointer; transition: all 0.2s; }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .gu-select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; outline: none; margin-top: 4px; }
  .parking-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .parking-list::-webkit-scrollbar { width: 4px; }
  .parking-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .parking-item { padding: 12px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .parking-item:hover, .parking-item.selected { background: var(--surface2); }
  .parking-item .name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .parking-item .addr { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .parking-item .tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .tag-free { background: rgba(79,200,100,0.15); color: #4fc864; }
  .tag-paid { background: rgba(247,162,79,0.15); color: var(--accent2); }
  .tag-24h { background: rgba(79,142,247,0.15); color: var(--accent); }
  .tag-gu { background: rgba(255,255,255,0.08); color: var(--text-muted); }
  .nearby-panel { background: var(--surface); border-top: 2px solid var(--accent); padding: 14px 18px; max-height: 230px; overflow-y: auto; display: none; }
  .nearby-panel.visible { display: block; }
  .nearby-panel h3 { font-size: 12px; font-weight: 500; color: var(--accent); margin-bottom: 8px; }
  .nearby-tabs { display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; }
  .nearby-tab { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 9px; color: var(--text-muted); font-family: 'Noto Sans KR', sans-serif; font-size: 11px; cursor: pointer; transition: all 0.2s; }
  .nearby-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .nearby-list { list-style: none; }
  .nearby-list li { padding: 6px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .nearby-list li:last-child { border-bottom: none; }
  .nearby-list .place-name { font-size: 12px; color: var(--text); }
  .nearby-list .place-dist { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .empty { padding: 24px 18px; text-align: center; color: var(--text-muted); font-size: 13px; line-height: 1.8; }
</style>
</head>

<header>
  <div class="logo">대구<span>주차맵</span></div>

  </div>
  <button class="btn btn-outline" onclick="useMyLocation()">📍 내 위치</button>
</header>
<div class="main">
  <div id="map"></div>
  <div class="sidebar">

      <div class="sub">대구광역시 전체 주차장</div>
    </div>
    <div class="filter-section">
      <div class="filter-label">구/군 선택</div>
      <select class="gu-select" id="guSelect" onchange="applyFilters()">
        <option value="all">전체</option>
        <option value="중구">중구</option>
        <option value="동구">동구</option>
        <option value="서구">서구</option>
        <option value="남구">남구</option>
        <option value="북구">북구</option>
        <option value="수성구">수성구</option>
        <option value="달서구">달서구</option>
        <option value="달성군">달성군</option>
        <option value="군위군">군위군</option>
      </select>
    </div>
    <div class="filter-section">
      <div class="filter-label">요금</div>
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('fee','all',this)">전체</button>
        <button class="filter-btn" onclick="setFilter('fee','free',this)">무료</button>
        <button class="filter-btn" onclick="setFilter('fee','paid',this)">유료</button>
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-label">운영</div>
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('h24','all',this)">전체</button>
        <button class="filter-btn" onclick="setFilter('h24','24h',this)">24시간</button>
      </div>
    </div>
    <div class="parking-list" id="parkingList"></div>
    <div class="nearby-panel" id="nearbyPanel">
      <h3>📍 <span id="nearbyTitle">주변 시설</span></h3>
      <div class="nearby-tabs">
        <button class="nearby-tab active" onclick="loadNearby('FD6',this)">음식점</button>
        <button class="nearby-tab" onclick="loadNearby('CE7',this)">카페</button>
        <button class="nearby-tab" onclick="loadNearby('CS2',this)">편의점</button>
        <button class="nearby-tab" onclick="loadNearby('HP8',this)">병원</button>
        <button class="nearby-tab" onclick="loadNearby('PK6',this)">주차장</button>
      </div>

  <ul class="nearby-list" id="nearbyList"></ul>
    </div>
  </div>
</div>

window.onload = function() {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(35.8714, 128.6014),

  });

  });

function filterData() {
  return PARKING_DATA.filter(p => {
    if (filters.gu !== 'all' && p.gu !== filters.gu) return false;
    if (filters.fee === 'free' && !p.free) return false;
    if (filters.fee === 'paid' && p.free) return false;
    if (filters.h24 === '24h' && !p.h24) return false;
    return true;
  });
}

function setFilter(type, value, btn) {
  filters[type] = value;
  btn.closest('.filter-row').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  filters.gu = document.getElementById('guSelect').value;
  renderParking();
}

function renderParking() {
  const filtered = filterData();
  document.getElementById('parkingCount').textContent = filtered.length + '개';

    return;
  }

  list.innerHTML = filtered.map((p, i) => `
    <div class="parking-item" id="item-${i}" onclick="selectParking(${i})">
      <div class="name">${p.name}</div>
      <div class="addr">${p.addr}</div>
      <div class="tags">
        ${p.free ? '<span class="tag tag-free">무료</span>' : '<span class="tag tag-paid">유료</span>'}
        ${p.h24 ? '<span class="tag tag-24h">24시간</span>' : ''}
        <span class="tag tag-gu">${p.gu}</span>
        <span class="tag tag-gu">${p.total}면</span>
      </div>
    </div>`).join('');

  const newMarkers = filtered.map((p, i) => {
    const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(p.lat, p.lng), title: p.name });
    kakao.maps.event.addListener(marker, 'click', () => selectParking(i));
    return marker;
  });
  clusterer.addMarkers(newMarkers);
  markers = newMarkers;
}

function selectParking(i) {
  const filtered = filterData();
  const p = filtered[i];
  if (!p) return;
  document.querySelectorAll('.parking-item').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById('item-' + i);
  if (el) { el.classList.add('selected'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  map.setCenter(new kakao.maps.LatLng(p.lat, p.lng));
  map.setLevel(4);
  selectedLat = p.lat; selectedLng = p.lng;
  document.getElementById('nearbyTitle').textContent = p.name + ' 주변';
  document.getElementById('nearbyPanel').classList.add('visible');

  // 길찾기 버튼 업데이트
  const navBtn = document.getElementById('navBtn');
  if (navBtn) {
    navBtn.onclick = () => {
      const url = `kakaomap://route?ep=${p.lat},${p.lng}&by=CAR`;
      const webUrl = `https://map.kakao.com/link/to/${encodeURIComponent(p.name)},${p.lat},${p.lng}`;
      window.open(webUrl, '_blank');
    };
    navBtn.style.display = 'block';
    navBtn.textContent = '🚗 ' + p.name + ' 길찾기';
  }

  document.querySelectorAll('.nearby-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.nearby-tab').classList.add('active');
  loadNearby('FD6', document.querySelector('.nearby-tab'));
}

function loadNearby(category, btn) {
  if (!selectedLat) return;
  document.querySelectorAll('.nearby-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const list = document.getElementById('nearbyList');
  list.innerHTML = '<li><span class="place-name" style="color:var(--text-muted)">불러오는 중...</span></li>';
  ps.categorySearch(category, function(result, status) {
    if (status === kakao.maps.services.Status.OK) {
      list.innerHTML = result.slice(0, 8).map(place =>
        `<li><span class="place-name">${place.place_name}</span><span class="place-dist">${Math.round(place.distance)}m</span></li>`
      ).join('');
    } else {
      list.innerHTML = '<li><span class="place-name" style="color:var(--text-muted)">주변 장소를 찾지 못했어요</span></li>';
    }
  }, { location: new kakao.maps.LatLng(selectedLat, selectedLng), radius: 500, sort: kakao.maps.services.SortBy.DISTANCE });
}

function searchAddress() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;
  geocoder.addressSearch(query, function(result, status) {
    if (status === kakao.maps.services.Status.OK) {
      map.setCenter(new kakao.maps.LatLng(result[0].y, result[0].x));
      map.setLevel(5);
    } else {
      ps.keywordSearch(query, function(r, s) {
        if (s === kakao.maps.services.Status.OK) { map.setCenter(new kakao.maps.LatLng(r[0].y, r[0].x)); map.setLevel(5); }
        else alert('검색 결과를 찾지 못했어요.');
      }, { location: new kakao.maps.LatLng(35.8714, 128.6014) });
    }
  });
}

function useMyLocation() {
  if (!navigator.geolocation) { alert('위치 정보를 지원하지 않는 브라우저예요.'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    map.setCenter(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude));
    map.setLevel(5);
  }, () => alert('위치 정보를 가져오지 못했어요.'));
}

function clearMarkers() { clusterer.clear(); markers = []; }

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') searchAddress(); });

// ===== AI 챗봇 =====
const chatBtn = document.createElement('button');
chatBtn.className = 'btn';
chatBtn.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:1000;width:52px;height:52px;border-radius:50%;font-size:20px;padding:0;box-shadow:0 4px 20px rgba(79,142,247,0.4)';
chatBtn.innerHTML = '🤖';
chatBtn.onclick = toggleChat;
document.body.appendChild(chatBtn);

const chatPanel = document.createElement('div');
chatPanel.style.cssText = 'position:fixed;bottom:88px;right:24px;z-index:1000;width:340px;height:460px;background:#1a1d27;border:1px solid rgba(255,255,255,0.1);border-radius:16px;display:none;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.5);overflow:hidden';
chatPanel.innerHTML = `
  <div style="padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:8px">
    <span style="font-size:18px">🤖</span>
    <div>
      <div style="font-size:14px;font-weight:600;color:#e8eaf0">AI 주차 도우미</div>
      <div style="font-size:11px;color:#7a7f9a">목적지나 조건을 말씀해주세요</div>
    </div>
  </div>
  <div id="chatMessages" style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px"></div>
  <div style="padding:10px;border-top:1px solid rgba(255,255,255,0.07);display:flex;gap:8px">
    <input id="chatInput" placeholder="예: 동성로 근처 무료 주차장" style="flex:1;background:#22263a;border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:8px 12px;color:#e8eaf0;font-family:inherit;font-size:13px;outline:none" />
    <button onclick="sendChat()" style="background:#4f8ef7;border:none;border-radius:8px;padding:8px 14px;color:#fff;font-family:inherit;font-size:13px;cursor:pointer">전송</button>
  </div>
`;
document.body.appendChild(chatPanel);

document.getElementById('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

function toggleChat() {
  const isVisible = chatPanel.style.display === 'flex';
  chatPanel.style.display = isVisible ? 'none' : 'flex';
  if (!isVisible && document.getElementById('chatMessages').children.length === 0) {
    addMessage('ai', '안녕하세요! 대구 주차장 AI 도우미예요 😊\n\n목적지나 조건을 말씀해주시면 최적의 주차장을 추천해드릴게요!\n\n예시:\n• "동성로 근처 무료 주차장"\n• "수성못 가는데 어디 주차해?"\n• "달서구 24시간 주차장 알려줘"');
  }
}

function addMessage(role, text) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.style.cssText = role === 'user'
    ? 'align-self:flex-end;background:#4f8ef7;color:#fff;padding:8px 12px;border-radius:12px 12px 2px 12px;font-size:13px;max-width:80%;line-height:1.5;white-space:pre-wrap'
    : 'align-self:flex-start;background:#22263a;color:#e8eaf0;padding:8px 12px;border-radius:12px 12px 12px 2px;font-size:13px;max-width:90%;line-height:1.6;white-space:pre-wrap';
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function getWeather() {
  try {
    const res = await fetch('http://localhost:8000/api/weather');
    const data = await res.json();
    const items = data.response?.body?.items?.item || [];
    const weather = {};
    items.forEach(item => { weather[item.category] = item.obsrValue; });
    const pty = weather['PTY'] || '0';
    const temp = weather['T1H'] || '?';
    const reh = weather['REH'] || '?';
    const precipTypes = {'0':'맑음','1':'비','2':'비/눈','3':'눈','5':'빗방울','6':'빗방울/눈날림','7':'눈날림'};
    return {
      summary: `기온 ${temp}°C, ${precipTypes[pty]||'맑음'}, 습도 ${reh}%`,
      isRaining: pty !== '0',
      precipType: precipTypes[pty] || '맑음',
      temp: parseFloat(temp)
    };
  } catch(e) {
    return { summary: '날씨 정보 없음', isRaining: false, precipType: '맑음', temp: null };
  }
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const query = input.value.trim();
  if (!query) return;
  input.value = '';
  addMessage('user', query);

  const loadingDiv = addMessage('ai', '날씨 및 상황 분석 중...');

  const weather = await getWeather();
  const now = new Date();
  const timeStr = now.getHours() + '시 ' + now.getMinutes() + '분';
  const dayNames = ['일','월','화','수','목','금','토'];
  const dayStr = dayNames[now.getDay()] + '요일';
  const isNight = now.getHours() >= 21 || now.getHours() < 7;
  const isWeekend = now.getDay() === 0 || now.getDay() === 6;

  const guStats = {};
  PARKING_DATA.forEach(p => {
    if (!guStats[p.gu]) guStats[p.gu] = { total: 0, free: 0 };
    guStats[p.gu].total++;
    if (p.free) guStats[p.gu].free++;
  });

  const systemPrompt = `당신은 대구광역시 주차장 AI 추천 도우미입니다. 단순 검색이 아니라 사용자의 상황과 맥락을 분석하여 최적의 주차장을 추천합니다.

현재 상황:
- 시각: ${dayStr} ${timeStr}
- 날씨: ${weather.summary}
- 강수: ${weather.isRaining ? '있음 (' + weather.precipType + ')' : '없음'}
- 시간대: ${isNight ? '야간' : '주간'}
- 요일: ${isWeekend ? '주말' : '평일'}

맥락 분석 기준:
- 비/눈이 오면: 실내/지하 주차장 우선 추천
- 야간이면: 24시간 운영 주차장 우선
- 주말이면: 혼잡 예상 안내, 여유 많은 곳 추천
- 아이/노인 동반: 접근성 좋은 공영주차장 우선
- 장시간 주차: 무료 또는 저렴한 곳 추천
- 쇼핑/식사 목적: 목적지와 가까운 곳 우선

대구 전체 주차장 ${PARKING_DATA.length}개:
${Object.entries(guStats).map(([gu, s]) => `${gu} ${s.total}개(무료${s.free}개)`).join(', ')}

주차장 데이터:
${JSON.stringify(PARKING_DATA.slice(0, 40), null, 0)}

답변 형식:
1. 현재 날씨/시간 상황 한 줄 언급
2. 맥락 분석 결과 설명
3. 주차장 2~3개 추천 (이름, 주소, 무료/유료, 면수)
4. 실용적인 팁 한 줄
5. 반드시 마지막에: [MARKERS:{"ids":[id1,id2,id3]}]

한국어로 친절하게 답변하세요.`;

  try {
    const response = await fetch('http://localhost:8000/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: query }]
      })
    });
    const data = await response.json();
    const text = data.content[0].text;

    const markerMatch = text.match(/\[MARKERS:({.*?})\]/s);
    let cleanText = text.replace(/\[MARKERS:.*?\]/s, '').trim();
    loadingDiv.textContent = cleanText;

    if (markerMatch) {
      try {
        const { ids } = JSON.parse(markerMatch[1]);
        highlightParkings(ids);
      } catch(e) {}
    }
  } catch(e) {
    loadingDiv.textContent = '죄송해요, 일시적인 오류가 발생했어요. 다시 시도해주세요.';
  }
}

function highlightParkings(ids) {
  if (!ids || !ids.length) return;
  const targets = ids.map(id => PARKING_DATA[id]).filter(Boolean);
  if (!targets.length) return;

  // 지도 이동
  const avgLat = targets.reduce((s, p) => s + p.lat, 0) / targets.length;
  const avgLng = targets.reduce((s, p) => s + p.lng, 0) / targets.length;
  map.setCenter(new kakao.maps.LatLng(avgLat, avgLng));
  map.setLevel(5);

  // 강조 마커
  targets.forEach(p => {
    const marker = new kakao.maps.Marker({
      map,
      position: new kakao.maps.LatLng(p.lat, p.lng),
      title: p.name,
      zIndex: 10
    });
    const infowindow = new kakao.maps.InfoWindow({
      content: `<div style="padding:6px 10px;font-size:12px;font-weight:600;color:#1a1d27">${p.name}</div>`
    });
    infowindow.open(map, marker);
    markers.push(marker);
  });
}
